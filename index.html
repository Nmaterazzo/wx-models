}

function setMapRun(r, el) {
  MS.run = r;
  document.querySelectorAll('#mp-run .mc-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  loadGridAndRender();
}

function onHourSlide(val) {
  MS.hourIdx = parseInt(val);
  renderGridOverlay();
}

function togglePlay() {
  const btn = document.getElementById('map-play-btn');
  if (MS.playing) {
    clearInterval(MS.playTimer);
    MS.playing = false;
    btn.textContent = '▶';
    btn.classList.remove('playing');
  } else {
    MS.playing = true;
    btn.textContent = '■';
    btn.classList.add('playing');
    MS.playTimer = setInterval(() => {
      MS.hourIdx = (MS.hourIdx + 1) % Math.max(1, MS.hourSlots.length);
      const slider = document.getElementById('map-hour-slider');
      if (slider) slider.value = MS.hourIdx;
      renderGridOverlay();
    }, 900);
  }
}

async function loadGridAndRender() {
  drawLegend();
  try {
    await fetchGridData();
    renderGridOverlay();
  } catch(e) {
    setStatus(`ERROR: ${e.message}`);
  }
}

function initMap() {
  if (leafletMap) {
    // already initialized — just refresh data
    leafletMap.invalidateSize();
    if (!MS.gridData) loadGridAndRender();
    return;
  }

  const mapEl = document.getElementById('leaflet-map');
  leafletMap = L.map(mapEl, {
    center: [30.5, -83.5], // center of SE US
    zoom: 6,
    zoomControl: true,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:18, opacity:.9,
  }).addTo(leafletMap);

  // custom marker icon
  const wxIcon = L.divIcon({
    html:`<div style="width:28px;height:28px;border-radius:50%;background:rgba(13,24,41,.95);border:2px solid #38bdf8;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(56,189,248,.5);">📍</div>`,
    className:'',iconSize:[28,28],iconAnchor:[14,14],
  });

  // tap on map → point popup
  leafletMap.on('click', async(e) => {
    const {lat, lng:lon} = e.latlng;
    const name = `${lat.toFixed(3)}°N, ${Math.abs(lon).toFixed(3)}°W`;
    if (MS.marker) MS.marker.remove();
    MS.marker = L.marker([lat,lon],{icon:wxIcon}).addTo(leafletMap);
    MS.marker.bindPopup(`<div class="map-pin-popup"><h3>${name}</h3><div class="mp-row"><span class="mp-lbl">LOADING...</span></div></div>`,{maxWidth:220,className:''}).openPopup();
    // fetch point data
    try {
      const b = await fetchBundle('hrrr',['temp','wind','precip'],'12Z',lat,lon);
      const t = currentValue(b.temp)!=null?Math.round(currentValue(b.temp))+'°F':'--';
      const w = currentValue(b.wind)!=null?Math.round(currentValue(b.wind))+' mph':'--';
      const pv = b.precip?.values?.slice(0,24)||[];
      const pt = pv.reduce((a,v)=>a+(v||0),0);
      const p = pt>.001?pt.toFixed(2)+'"':'None';
      const html = `<div class="map-pin-popup">
        <h3>${name}</h3>
        <div class="mp-row"><span class="mp-lbl">TEMPERATURE</span><span class="mp-val">${t}</span></div>
        <div class="mp-row"><span class="mp-lbl">WIND</span><span class="mp-val">${w}</span></div>
        <div class="mp-row"><span class="mp-lbl">PRECIP 24H</span><span class="mp-val">${p}</span></div>
        <button class="mp-goto" onclick="loadMapPoint(${lat},${lon},'${name.replace(/'/g,"\\'")}')" >VIEW FULL FORECAST →</button>
      </div>`;
      if (MS.marker) MS.marker.setPopupContent(html);
    } catch(e) { /* leave loading state */ }
  });

  setTimeout(() => {
    leafletMap.invalidateSize();
    loadGridAndRender();
  }, 150);
}

function loadMapPoint(lat, lon, name) {
  S.loc = {lat, lon, name};
  document.getElementById('loc').value = name;
  S.loaded = true;
  if (MS.playing) togglePlay();
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.querySelector('.nb').classList.add('on');
  S.tab = 'forecast';
  document.getElementById('map-wrap').classList.remove('active');
  document.getElementById('scroll').style.display = '';
  document.querySelector('.ctrl').style.display = '';
  render();
}
