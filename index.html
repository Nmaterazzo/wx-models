<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WXMODELS | PRO COMP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy0: #080f1e; --navy1: #0d1829; --sky: #38bdf8; --rim: rgba(255,255,255,.08);
  --ink2: #4a6a90; --white: #e8f2fc; --R: 16px;
}
body {
  background: var(--navy0); color: var(--white);
  font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden;
}
#shell { display: flex; flex-direction: column; height: 100vh; }

/* Fixed Header */
.hdr { height: 56px; background: var(--navy1); display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--rim); justify-content: space-between; }
.logo { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
.logo b { color: var(--sky); }

/* Bottom Nav - Strictly Temp, Precip, Wind */
.bot { height: 70px; background: var(--navy1); display: flex; border-top: 1px solid var(--rim); padding-bottom: env(safe-area-inset-bottom); }
.nb { flex: 1; border: none; background: none; color: var(--ink2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
.nb.on { color: var(--sky); border-top: 3px solid var(--sky); background: rgba(56, 189, 248, 0.05); }
.ni { font-size: 20px; margin-bottom: 4px; } 
.nl { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }

/* Content Area */
.scroll { flex: 1; overflow-y: auto; padding: 16px; }
.card { background: rgba(255,255,255,.03); border-radius: var(--R); border: 1px solid var(--rim); margin-bottom: 16px; padding: 16px; }
.card-h { font-size: 12px; font-weight: 600; color: var(--ink2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

/* Chart Container - Internal Padding to prevent label clipping */
.ch-wrap { 
    position: relative; 
    height: 280px; 
    width: 100%;
}

/* Data Table */
.div-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 12px; }
.div-table th { text-align: left; color: var(--ink2); padding: 8px; border-bottom: 1px solid var(--rim); font-weight: 400; }
.div-table td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.02); }
.diff-high { color: #f87171; font-weight: bold; background: rgba(248, 113, 113, 0.1); border-radius: 4px; }
.val-pill { font-weight: 600; }
</style>
</head>
<body>

<div id="shell">
  <header class="hdr">
    <div class="logo">WX<b>MODELS</b></div>
    <div style="font-size: 12px; color: var(--ink2);">V2.0 PRO</div>
  </header>

  <div class="scroll" id="view">
    <!-- Dynamic Content -->
  </div>

  <nav class="bot">
    <button class="nb on" onclick="changeVar('temp', this)"><span class="ni">🌡</span><span class="nl">TEMP</span></button>
    <button class="nb" onclick="changeVar('precip', this)"><span class="ni">🌧</span><span class="nl">PRECIP</span></button>
    <button class="nb" onclick="changeVar('wind', this)"><span class="ni">💨</span><span class="nl">WIND</span></button>
  </nav>
</div>

<script>
// Model Configuration
const MODELS = {
  hrrr: {l:'HRRR', c:'#38bdf8'},
  gfs:  {l:'GFS',  c:'#fb923c'},
  ecm:  {l:'ECMWF',c:'#f472b6'}
};

let currentVar = 'temp';
let chartInstance = null;

function changeVar(v, el) {
    currentVar = v;
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    render();
}

function render() {
    const view = document.getElementById('view');
    view.innerHTML = `
        <div class="card">
            <div class="card-h">${currentVar} Divergence: 24H Forecast</div>
            <div class="ch-wrap"><canvas id="cmpChart"></canvas></div>
        </div>
        <div class="card">
            <div class="card-h">Hourly Model Spread (Raw)</div>
            <table class="div-table" id="dataTable"></table>
        </div>
    `;
    initChart();
    initTable();
}

function initChart() {
    const ctx = document.getElementById('cmpChart').getContext('2d');
    
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array.from({length: 24}, (_, i) => i === 0 ? 'NOW' : i + ':00'),
            datasets: Object.keys(MODELS).map(k => ({
                label: MODELS[k].l,
                data: Array.from({length: 24}, () => (Math.random() * 15 + 65).toFixed(1)),
                borderColor: MODELS[k].c,
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 5,
                tension: 0.3
            }))
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            layout: {
                padding: {
                    top: 25,    // Buffer for "NOW" label
                    bottom: 10, // Buffer for X-axis labels
                    left: 5,
                    right: 15
                }
            },
            plugins: {
                legend: {
                    display: true,
                    position: 'top',
                    align: 'end',
                    labels: { color: '#4a6a90', boxWidth: 8, font: { size: 10, weight: 'bold' } }
                },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    backgroundColor: '#0d1829',
                    titleColor: '#38bdf8',
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { color: '#4a6a90', font: { size: 10 }, maxRotation: 0 }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.03)' },
                    ticks: { color: '#4a6a90', font: { size: 10 } }
                }
            }
        }
    });
}

function initTable() {
    const table = document.getElementById('dataTable');
    let html = `<tr>
        <th>Hour</th>
        <th style="color:${MODELS.hrrr.c}">HRRR</th>
        <th style="color:${MODELS.gfs.c}">GFS</th>
        <th style="color:${MODELS.ecm.c}">ECM</th>
        <th>Δ</th>
    </tr>`;

    for(let i=0; i<24; i++) {
        let base = currentVar === 'temp' ? 72 : currentVar === 'wind' ? 12 : 0.1;
        let v1 = base + Math.random()*4;
        let v2 = base + Math.random()*4;
        let v3 = base + Math.random()*4;
        let spread = Math.max(v1,v2,v3) - Math.min(v1,v2,v3);
        
        html += `<tr>
            <td style="color:var(--ink2)">${i === 0 ? '<b>NOW</b>' : i+':00'}</td>
            <td class="val-pill">${v1.toFixed(1)}</td>
            <td class="val-pill">${v2.toFixed(1)}</td>
            <td class="val-pill">${v3.toFixed(1)}</td>
            <td class="${spread > 2.5 ? 'diff-high' : ''}">${spread.toFixed(1)}</td>
        </tr>`;
    }
    table.innerHTML = html;
}

// Start
window.addEventListener('load', render);

</script>
</body>
</html>
